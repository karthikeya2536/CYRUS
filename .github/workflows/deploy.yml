name: Deploy

# Deploys migrations + edge functions to the linked Supabase project.
# Only runs after CI succeeds, via workflow_run trigger. Manual deploy via
# workflow_dispatch is available for emergency or rollback scenarios.
#
# Requires repository secrets:
#   SUPABASE_ACCESS_TOKEN  - personal access token (supabase.com/account/tokens)
#   SUPABASE_PROJECT_REF   - target project ref (e.g. qdtyxwmejvyxqgtpibqn)
#   SUPABASE_DB_PASSWORD   - database password (for db push)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: db push + functions deploy
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_branch || '' }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy
