name: Deploy

# Deploys migrations + edge functions to the linked Supabase project.
# Requires repository secrets:
#   SUPABASE_ACCESS_TOKEN  - personal access token (supabase.com/account/tokens)
#   SUPABASE_PROJECT_REF   - target project ref (e.g. qdtyxwmejvyxqgtpibqn)
#   SUPABASE_DB_PASSWORD   - database password (for db push)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: db push + functions deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy
