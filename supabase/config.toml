
# Stripe calls this endpoint directly (no Supabase JWT). Authenticity is
# enforced via Stripe-Signature HMAC verification inside the function.
[functions.stripe-webhook]
enabled = true
verify_jwt = false

[functions.memory-extraction]
enabled = true
verify_jwt = false
import_map = "./functions/memory-extraction/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/memory-extraction/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/memory-extraction/*.html" ]

# llm-worker: invoked by pg_cron via pg_net (no Supabase JWT).
# Authentication is handled by the x-worker-secret header, verified inside
# the function handler at supabase/functions/llm-worker/index.ts:526-528.
# verify_jwt MUST be false — pg_net does not attach a user JWT.
[functions.llm-worker]
enabled = true
verify_jwt = false
import_map = "./functions/llm-worker/deno.json"
entrypoint = "./functions/llm-worker/index.ts"

# gmail-sync: serves UI calls (JWT validated via getUser inside the handler)
# AND scheduled calls from pg_cron via pg_net (authenticated by the
# x-worker-secret header, same as llm-worker). pg_net does not attach a user
# JWT, so verify_jwt MUST be false; the function enforces auth on both paths.
[functions.gmail-sync]
enabled = true
verify_jwt = false

# calendar-sync: same dual-path auth as gmail-sync (UI JWT or x-worker-secret
# system invocation from pg_cron). verify_jwt MUST be false; the function
# enforces auth on both paths.
[functions.calendar-sync]
enabled = true
verify_jwt = false

# generate-briefing: same dual-path auth (UI JWT or x-worker-secret system
# invocation from pg_cron). verify_jwt MUST be false; the function enforces auth,
# duplicate protection, and quota on both paths.
[functions.generate-briefing]
enabled = true
verify_jwt = false
